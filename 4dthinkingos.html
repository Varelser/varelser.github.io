<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>4D Thinking OS</title>
  <meta
    name="description"
    content="Thought Workbench / 4D Thinking OS launcher page for VARELSER."
  />
  <meta name="theme-color" content="#020202" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #020202;
      --fg: #f5f5f5;
      --muted: rgba(245, 245, 245, 0.72);
      --border: rgba(245, 245, 245, 0.14);
      --panel: rgba(255, 255, 255, 0.04);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    }

    body {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
    }

    .title {
      min-width: 0;
    }

    .title h1 {
      margin: 0;
      font-size: 14px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .title p {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .actions a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel);
      color: var(--fg);
      text-decoration: none;
      font-size: 12px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--bg);
    }

    @media (max-width: 720px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .actions {
        width: 100%;
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="title">
      <h1>4D Thinking OS</h1>
      <p>Thought Workbench embedded launcher for VARELSER</p>
    </div>
    <nav class="actions" aria-label="4D Thinking OS actions">
      <a href="/4dthinkingos/" target="_blank" rel="noreferrer">Open Standalone</a>
      <a href="/" rel="noreferrer">Back to VARELSER</a>
    </nav>
  </header>
  <iframe
    title="4D Thinking OS"
    src="/4dthinkingos/"
    loading="eager"
    referrerpolicy="strict-origin-when-cross-origin"
  ></iframe>
</body>
</html>
