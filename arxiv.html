<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Research Digest | VARELSER</title>
  <style>
    :root{
      --bg:#fff;
      --fg:#111;
      --muted:rgba(0,0,0,.55);
      --border:#e8e8e8;
      --accent:#0056b3;
      --card-bg:#fafafa;
      --chip-bg:#f3f3f3;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family:ui-sans-serif,system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP","Segoe UI",sans-serif;
      line-height:1.8;
      font-size:16px;
    }
    .container{
      max-width:860px;
      margin:0 auto;
      padding:48px 24px;
    }
    .back-link{
      display:inline-block;
      margin-bottom:32px;
      color:var(--muted);
      text-decoration:none;
      font-size:14px;
    }
    .back-link:hover{color:var(--fg);}
    .page-title{
      font-size:22px;
      font-weight:700;
      margin:0 0 8px;
      letter-spacing:.02em;
    }
    .page-desc{
      color:var(--muted);
      font-size:13px;
      margin:0 0 28px;
    }
    .digest-controls{
      margin:0 0 40px;
      padding:18px;
      border:1px solid var(--border);
      background:#fff;
      border-radius:10px;
    }
    .digest-controls-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
    }
    .control{display:block;}
    .control span{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin:0 0 6px;
    }
    .control select,.control input{
      width:100%;
      height:42px;
      padding:0 12px;
      border:1px solid var(--border);
      border-radius:8px;
      background:#fff;
      color:var(--fg);
      font-size:14px;
    }
    .control-wide{grid-column:1 / -1;}
    .digest-result-count{
      margin:14px 0 0;
      color:var(--muted);
      font-size:13px;
    }
    article{
      margin-bottom:56px;
      padding-bottom:48px;
      border-bottom:1px solid var(--border);
    }
    article:last-child{border-bottom:none;}
    .meta{
      font-size:12px;
      color:var(--muted);
      margin:0 0 10px;
      letter-spacing:.02em;
    }
    .article-title{
      font-size:19px;
      font-weight:700;
      margin:0 0 14px;
      line-height:1.5;
      letter-spacing:.01em;
    }
    .article-tags{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin:0 0 14px;
    }
    .tag{
      display:inline-flex;
      align-items:center;
      min-height:28px;
      padding:0 10px;
      border-radius:999px;
      background:var(--chip-bg);
      border:1px solid var(--border);
      color:#333;
      font-size:12px;
      line-height:1;
    }
    .summary{
      font-size:15px;
      color:#222;
      line-height:1.9;
      margin-bottom:24px;
      white-space:normal;
    }
    .source-box{
      background:var(--card-bg);
      border:1px solid var(--border);
      border-radius:8px;
      padding:14px 16px;
      font-size:13px;
      color:#555;
      line-height:1.7;
    }
    .source-box strong{
      color:var(--fg);
      display:block;
      margin-bottom:4px;
    }
    .source-box a{
      color:var(--accent);
      word-break:break-all;
    }
    @media (max-width: 720px){
      .container{padding:32px 16px;}
      .digest-controls-grid{grid-template-columns:1fr;}
      .control-wide{grid-column:auto;}
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/hp/" class="back-link">← ホームに戻る</a>
    <p class="page-title">最新のAI・哲学・研究論文</p>
    <p class="page-desc">最新のAI・哲学・研究論文をAIで要約し、日付・ジャンル・分野で整理して表示します。</p>

    <section class="digest-controls" aria-label="論文の整理">
      <div class="digest-controls-grid">
        <label class="control">
          <span>日付</span>
          <select id="filter-month">
            <option value="">すべて</option>
          </select>
        </label>

        <label class="control">
          <span>ジャンル</span>
          <select id="filter-genre">
            <option value="">すべて</option>
          </select>
        </label>

        <label class="control">
          <span>分野</span>
          <select id="filter-field">
            <option value="">すべて</option>
          </select>
        </label>

        <label class="control">
          <span>配信元</span>
          <select id="filter-source">
            <option value="">すべて</option>
          </select>
        </label>

        <label class="control control-wide">
          <span>キーワード</span>
          <input id="filter-keyword" type="search" placeholder="タイトル・要約・分類を検索" />
        </label>

        <label class="control">
          <span>並び順</span>
          <select id="sort-order">
            <option value="newest">新しい順</option>
            <option value="oldest">古い順</option>
            <option value="title">タイトル順</option>
          </select>
        </label>
      </div>
      <p id="digest-result-count" class="digest-result-count"></p>
    </section>

    <!-- ARTICLES_START -->
    <!-- ARTICLES_END -->
  </div>

  <script>
    (function(){
      function byId(id){ return document.getElementById(id); }

      function normalize(text){
        try {
          return String(text || '').toLowerCase().normalize('NFKC').replace(/\s+/g, ' ').trim();
        } catch (e) {
          return String(text || '').toLowerCase().replace(/\s+/g, ' ').trim();
        }
      }

      function uniqueSorted(list){
        return Array.from(new Set(list.filter(Boolean))).sort(function(a, b){
          return String(a).localeCompare(String(b), 'ja');
        });
      }

      function fillSelect(select, values){
        if (!select) return;
        var current = select.value || '';
        select.innerHTML = '';

        var base = document.createElement('option');
        base.value = '';
        base.textContent = 'すべて';
        select.appendChild(base);

        values.forEach(function(value){
          var option = document.createElement('option');
          option.value = value;
          option.textContent = value;
          select.appendChild(option);
        });

        for (var i = 0; i < select.options.length; i++) {
          if (select.options[i].value === current) {
            select.value = current;
            break;
          }
        }
      }

      function getArticles(){
        return Array.prototype.slice.call(document.querySelectorAll('article.digest-article'));
      }

      function buildOptions(){
        var articles = getArticles();
        fillSelect(byId('filter-month'), uniqueSorted(articles.map(function(el){ return el.dataset.month || ''; })).reverse());
        fillSelect(byId('filter-genre'), uniqueSorted(articles.map(function(el){ return el.dataset.genre || ''; })));
        fillSelect(byId('filter-field'), uniqueSorted(articles.map(function(el){ return el.dataset.field || ''; })));
        fillSelect(byId('filter-source'), uniqueSorted(articles.map(function(el){ return el.dataset.source || ''; })));
      }

      function getKeywordHaystack(article){
        return normalize([
          article.dataset.title || '',
          article.dataset.genre || '',
          article.dataset.field || '',
          article.dataset.source || '',
          article.dataset.categories || '',
          article.textContent || ''
        ].join(' '));
      }

      function applyFilters(){
        var month = byId('filter-month') ? byId('filter-month').value : '';
        var genre = byId('filter-genre') ? byId('filter-genre').value : '';
        var field = byId('filter-field') ? byId('filter-field').value : '';
        var source = byId('filter-source') ? byId('filter-source').value : '';
        var keyword = normalize(byId('filter-keyword') ? byId('filter-keyword').value : '');
        var sortOrder = byId('sort-order') ? byId('sort-order').value : 'newest';
        var articles = getArticles();

        var matched = articles.filter(function(article){
          if (month && (article.dataset.month || '') !== month) return false;
          if (genre && (article.dataset.genre || '') !== genre) return false;
          if (field && (article.dataset.field || '') !== field) return false;
          if (source && (article.dataset.source || '') !== source) return false;
          if (keyword && getKeywordHaystack(article).indexOf(keyword) === -1) return false;
          return true;
        });

        var sorted = matched.slice().sort(function(a, b){
          if (sortOrder === 'oldest') {
            return Number(a.dataset.timestamp || 0) - Number(b.dataset.timestamp || 0);
          }
          if (sortOrder === 'title') {
            return String(a.dataset.title || '').localeCompare(String(b.dataset.title || ''), 'ja');
          }
          return Number(b.dataset.timestamp || 0) - Number(a.dataset.timestamp || 0);
        });

        articles.forEach(function(article){
          article.style.display = 'none';
        });

        sorted.forEach(function(article){
          article.style.display = '';
          article.parentNode.appendChild(article);
        });

        var counter = byId('digest-result-count');
        if (counter) {
          counter.textContent = '表示件数: ' + matched.length + ' / ' + articles.length;
        }
      }

      document.addEventListener('DOMContentLoaded', function(){
        buildOptions();

        ['filter-month', 'filter-genre', 'filter-field', 'filter-source', 'sort-order'].forEach(function(id){
          var el = byId(id);
          if (el) el.addEventListener('change', applyFilters);
        });

        var keyword = byId('filter-keyword');
        if (keyword) keyword.addEventListener('input', applyFilters);

        applyFilters();
      });
    })();
  </script>
</body>
</html>
