<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VARELSER</title>
  <meta name="description" content="VARELSER official site" />

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #111111;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .wrap {
      width: 100%;
      max-width: 960px;
      padding: 40px 20px 60px;
    }

    h1 {
      margin: 0 0 24px;
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .youtube-embed {
      width: 100%;
    }

    .frame {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000000;
      border-radius: 18px;
      overflow: hidden;
    }

    .frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>VARELSER</h1>

    <section class="youtube-embed" aria-label="YouTube video">
      <div class="frame">
        <iframe
          src="https://www.youtube.com/embed/eu4yQ6wWndw"
          title="YouTube video player"
          loading="lazy"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen>
        </iframe>
      </div>
    </section>
  </main>
</body>
</html>
