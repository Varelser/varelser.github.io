<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VARELSER</title>
    <meta name="description" content="VARELSER の公式兖閃ページ。Thought Workbench への六加入口." />
    <meta name="theme-color" content="#070707" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #070707;
        --panel: #111111;
        --border: rgba(255, 255, 255, 0.12);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.6);
        --accent: #ffffff;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      }
      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(720px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 32px 24px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 5vw, 48px);
        letter-spacing: 0.08em;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }
      .grid {
        margin-top: 24px;
        display: grid;
        gap: 12px;
      }
      .card {
        display: block;
        padding: 18px 16px;
        border: 1px solid var(--border);
        border-radius: 16px;
        color: var(--text);
        text-decoration: none;
        transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
        background: rgba(255, 255, 255, 0.02);
      }
      .card:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 255, 255, 0.24);
        background: rgba(255, 255, 255, 0.04);
      }
      .card strong {
        display: block;
        font-size: 18px;
        margin-bottom: 6px;
      }
      .footer {
        margin-top: 20px;
        font-size: 13px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>VARELSER</h1>
      <p>公式版作ニカタレグ、 実験・ツールの入口。</p>
      <div class="grid">
        <a class="card" href="/4dthinkingos/">
          <strong>Thought Workbench</strong>
          <span>空間知マップィングアプリ</span>
        </a>
        <a class="card" href="https://github.com/Varelser" target="_blank" rel="noopener">
          <strong>GitHub</strong>
          <span>リポジトリ一覧</span>
        </a>
      </div>
      <p class="footer">このページは GAtHub Pages の q啬（凪口）にして使用します。</p>
    </main>
  </body>
</html>
